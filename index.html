    <style>
      #bootSplash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 24px;
        background: #0F172A;
        color: #f8fafc;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        letter-spacing: -0.01em;
        text-align: center;
        transition: opacity 220ms ease;
        -webkit-user-select: none;
        user-select: none;
      }
      @media (prefers-color-scheme: light) {
        #bootSplash { background: #F7F8FB; color: #0f172a; }
      }
      #bootSplash.is-ready {
        opacity: 0;
        pointer-events: none;
      }
      #bootSplash svg {
        width: 96px;
        height: 96px;
        display: block;
        filter: drop-shadow(0 8px 24px rgba(99, 102, 241, 0.45));
      }
      #bootSplash .boot-splash__title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0;
      }
      #bootSplash .boot-splash__spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2.5px solid rgba(248, 250, 252, 0.18);
        border-top-color: currentColor;
        animation: bootSplashRot 0.9s linear infinite;
      }
      @media (prefers-color-scheme: light) {
        #bootSplash .boot-splash__spinner {
          border-color: rgba(15, 23, 42, 0.12);
          border-top-color: currentColor;
        }
      }
      @keyframes bootSplashRot { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        #bootSplash .boot-splash__spinner { animation-duration: 2.5s; }
        #bootSplash { transition: none; }
      }
    </style>
  </head>
