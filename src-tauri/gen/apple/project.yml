name: subly
options:
  bundleIdPrefix: com.s00d.subly
  deploymentTarget:
    iOS: 16.0
fileGroups: [../../src]
configs:
  debug: debug
  release: release
settingGroups:
  app:
    base:
      PRODUCT_NAME: Subly
      PRODUCT_BUNDLE_IDENTIFIER: com.s00d.subly
      # Same as bundle.iOS.developmentTeam in ../../tauri.conf.json — required for app + SublyWidgetExtension
      DEVELOPMENT_TEAM: R6VC7JTLE8
targetTemplates:
  app:
    type: application
    sources:
      - path: Sources
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      groups: [app]
targets:
  subly_iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: ../../ios-apple/widget_reload.swift
      - path: Assets.xcassets
      # Do not add Externals/ here: both arm64/debug and arm64/release libapp.a would be copied to the same Subly.app/libapp.a and Xcode fails with "Multiple commands produce".
      # Rust output stays under Externals/...; linking uses LIBRARY_SEARCH_PATHS + dependency libapp.a below.
      - path: subly_iOS
      - path: assets
        buildPhase: resources
        type: folder
      - path: LaunchScreen.storyboard
      - path: PrivacyInfo.xcprivacy
        buildPhase: resources
    info:
      path: subly_iOS/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        ITSAppUsesNonExemptEncryption: false
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64, metal]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleShortVersionString: 1.0.2
        CFBundleVersion: "10003"
    # Must match src-tauri/entitlements/ios.plist (App Groups + iCloud). Empty gen/subly_iOS*.entitlements breaks widget + sync.
    entitlements:
      path: ../../entitlements/ios.plist
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      base:
        # Tauri ios xcode-script may merge entitlements during build; Xcode otherwise errors.
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64 
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME) $(TOOLCHAIN_DIR)/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME) $(TOOLCHAIN_DIR)/usr/lib/swift-5.0/$(PLATFORM_NAME)
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
      groups: [app]
    dependencies:
      - framework: libapp.a
        embed: false
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
      - target: SublyWidgetExtension
        embed: true
    preBuildScripts:
      # Do not pass ${FORCE_COLOR} as a shell word here: when Xcode sets FORCE_COLOR=0 it becomes a
      # separate argv between --configuration and ARCHS; the CLI then treats "0" as the arch →
      # "Arch specified by Xcode was invalid".
      - script: export FORCE_COLOR="${FORCE_COLOR:-}"; pnpm tauri ios xcode-script -v --platform ${PLATFORM_DISPLAY_NAME:?} --sdk-root ${SDKROOT:?} --framework-search-paths "${FRAMEWORK_SEARCH_PATHS:?}" --header-search-paths "${HEADER_SEARCH_PATHS:?}" --gcc-preprocessor-definitions "${GCC_PREPROCESSOR_DEFINITIONS:-}" --configuration ${CONFIGURATION:?} ${ARCHS:?}
        name: Build Rust Code
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/Externals/x86_64/${CONFIGURATION}/libapp.a
          - $(SRCROOT)/Externals/arm64/${CONFIGURATION}/libapp.a

  SublyWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ../../ios-apple/SublyWidget
        excludes:
          - "*.entitlements"
          - "Info.plist"
    entitlements:
      path: ../../ios-apple/SublyWidget/SublyWidget.entitlements
    settings:
      base:
        # XcodeGen merged DEVELOPMENT_TEAM into Release only for extensions; Debug must have Team too.
        DEVELOPMENT_TEAM: R6VC7JTLE8
        CODE_SIGN_STYLE: Automatic
        APPLICATION_EXTENSION_API_ONLY: YES
        # YES lets Xcode strip entitlements to match the provisioning profile; if the widget profile
        # lacks App Groups, the signed appex can end up with no entitlements → App Store 409 validation.
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.s00d.subly.widget
        PRODUCT_NAME: SublyWidgetExtension
        INFOPLIST_FILE: ../../ios-apple/SublyWidget/Info.plist
        MARKETING_VERSION: 1.0.2
        CURRENT_PROJECT_VERSION: "10003"
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: 16.0
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
      groups: [app]
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
      - sdk: UIKit.framework