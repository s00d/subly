<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Subly</title>
    <style>
      :root {
        color-scheme: light dark;
        --splash-bg: #0f172a;
        --splash-fg: #f8fafc;
        --splash-muted: rgba(248, 250, 252, 0.55);
        --splash-ring: rgba(248, 250, 252, 0.18);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --splash-bg: #f7f8fb;
          --splash-fg: #0f172a;
          --splash-muted: rgba(15, 23, 42, 0.55);
          --splash-ring: rgba(15, 23, 42, 0.12);
        }
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--splash-bg);
        color: var(--splash-fg);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        letter-spacing: -0.01em;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }
      .subly-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 24px;
        text-align: center;
      }
      .subly-splash__logo {
        width: 112px;
        height: 112px;
        display: block;
        filter: drop-shadow(0 10px 28px rgba(99, 102, 241, 0.35));
      }
      .subly-splash__title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0;
        color: var(--splash-fg);
      }
      .subly-splash__hint {
        font-size: 12px;
        color: var(--splash-muted);
        margin: 0;
      }
      .subly-spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2.5px solid var(--splash-ring);
        border-top-color: currentColor;
        animation: subly-rot 0.9s linear infinite;
        color: var(--splash-fg);
      }
      @keyframes subly-rot { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        .subly-spinner { animation-duration: 2.5s; }
      }
    </style>
  </head>
