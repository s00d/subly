name: Build and Release Subly

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
            os: 'macos'
          - platform: 'ubuntu-22.04'
            args: ''
            os: 'linux'
          - platform: 'windows-latest'
            args: ''
            os: 'windows'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
            C:\Users\runneradmin\.cargo\registry\index\
            C:\Users\runneradmin\.cargo\registry\cache\
            C:\Users\runneradmin\.cargo\git\db\
          key: ${{ runner.os }}-cargo-${{ matrix.args }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.args }}-
            ${{ runner.os }}-cargo-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Import Developer ID certificate (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          SUBLY_DEVID_CERT_P12_BASE64: ${{ secrets.SUBLY_DEVID_CERT_P12_BASE64 }}
          SUBLY_DEVID_CERT_PASSWORD: ${{ secrets.SUBLY_DEVID_CERT_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "$SUBLY_DEVID_CERT_P12_BASE64" ]; then
            echo "SUBLY_DEVID_CERT_P12_BASE64 is not set"; exit 1;
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/subly-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 12)"
          CERT_PATH="$RUNNER_TEMP/subly-devid-cert.p12"
          echo "$SUBLY_DEVID_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$SUBLY_DEVID_CERT_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "Available signing identities in CI keychain:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
          SELECTED_IDENTITY=""
          if [ -n "$APPLE_SIGNING_IDENTITY" ] && security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -F "$APPLE_SIGNING_IDENTITY" >/dev/null; then
            SELECTED_IDENTITY="$APPLE_SIGNING_IDENTITY"
            echo "Using APPLE_SIGNING_IDENTITY from secret."
          else
            SELECTED_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -n1)"
            if [ -z "$SELECTED_IDENTITY" ]; then
              echo "No usable Developer ID Application identity found in keychain."
              exit 1
            fi
            echo "Using detected signing identity from keychain."
          fi
          echo "APPLE_SIGNING_IDENTITY=$SELECTED_IDENTITY" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          SUBLY_API_KEY_BASE64: ${{ secrets.SUBLY_API_KEY_BASE64 }}
        run: |
          if [ -z "$SUBLY_API_KEY_BASE64" ]; then
            echo "SUBLY_API_KEY_BASE64 is not set"; exit 1;
          fi
          echo "$SUBLY_API_KEY_BASE64" | base64 --decode > AuthKey_33V5B24JP9.p8

      - name: Provisioning profile (macOS Developer ID, iCloud)
        if: matrix.platform == 'macos-latest'
        env:
          SUBLY_PROVISIONPROFILE_BASE64: ${{ secrets.SUBLY_PROVISIONPROFILE_BASE64 }}
        run: |
          mkdir -p src-tauri/profiles
          python3 - <<'PY'
          import base64, os, sys
          b64 = os.environ.get("SUBLY_PROVISIONPROFILE_BASE64")
          if not b64:
            raise SystemExit("Missing secret SUBLY_PROVISIONPROFILE_BASE64")
          data = base64.b64decode(b64)
          out_path = "src-tauri/profiles/Subly_DeveloperID_iCloud_macOS.provisionprofile"
          with open(out_path, "wb") as f:
            f.write(data)
          print("Wrote", out_path, "bytes=", len(data))
          PY

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: "AuthKey_33V5B24JP9.p8"
        with:
          tagName: v__VERSION__
          appName: 'subly_${{ matrix.os }}'
          releaseName: 'Subly v__VERSION__'
          releaseBody: |
            ## Subly v__VERSION__

            Subscription & expense tracker desktop application.

            ### Downloads
            See the assets below to download for your platform.

            > **Note:** macOS builds are unsigned. You may need to right-click → Open on first launch.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          includeDebug: false
          includeRelease: true
