name: App Store macOS MAS

on:
  workflow_dispatch:
    inputs:
      upload_to_appstore:
        description: "Upload PKG to App Store Connect"
        required: true
        default: false
        type: boolean

jobs:
  macos:
    name: Build macOS MAS PKG
    runs-on: macos-latest
    env:
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      SUBLY_API_KEY_BASE64: ${{ secrets.SUBLY_API_KEY_BASE64 }}
      SUBLY_MAS_APP_CERT_P12_BASE64: ${{ secrets.SUBLY_MAS_APP_CERT_P12_BASE64 }}
      SUBLY_MAS_APP_CERT_PASSWORD: ${{ secrets.SUBLY_MAS_APP_CERT_PASSWORD }}
      SUBLY_MAS_INSTALLER_CERT_P12_BASE64: ${{ secrets.SUBLY_MAS_INSTALLER_CERT_P12_BASE64 }}
      SUBLY_MAS_INSTALLER_CERT_PASSWORD: ${{ secrets.SUBLY_MAS_INSTALLER_CERT_PASSWORD }}
      SUBLY_MAS_PROVISIONPROFILE_BASE64: ${{ secrets.SUBLY_MAS_PROVISIONPROFILE_BASE64 }}
      MAS_APP_SIGNING_IDENTITY: ${{ secrets.MAS_APP_SIGNING_IDENTITY }}
      MAS_INSTALLER_SIGNING_IDENTITY: ${{ secrets.MAS_INSTALLER_SIGNING_IDENTITY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install

      - name: Import MAS signing certificates
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/subly-appstore.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 12)"
          APP_CERT_PATH="$RUNNER_TEMP/mas-app-cert.p12"
          INSTALLER_CERT_PATH="$RUNNER_TEMP/mas-installer-cert.p12"

          echo "$SUBLY_MAS_APP_CERT_P12_BASE64" | base64 --decode > "$APP_CERT_PATH"
          echo "$SUBLY_MAS_INSTALLER_CERT_P12_BASE64" | base64 --decode > "$INSTALLER_CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$APP_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$SUBLY_MAS_APP_CERT_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security import "$INSTALLER_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$SUBLY_MAS_INSTALLER_CERT_PASSWORD" -A -T /usr/bin/productbuild -T /usr/bin/security

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Write App Store Connect API key
        run: |
          mkdir -p "$GITHUB_WORKSPACE/src-tauri/private_keys"
          KEY_PATH="$GITHUB_WORKSPACE/src-tauri/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          echo "$SUBLY_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Write MAS provisioning profile
        run: |
          mkdir -p src-tauri/profiles
          echo "$SUBLY_MAS_PROVISIONPROFILE_BASE64" | base64 --decode > src-tauri/profiles/Subly_MAS_macOS_Profile.provisionprofile

      - name: Build macOS app bundle (MAS config)
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.MAS_APP_SIGNING_IDENTITY }}
        run: pnpm tauri build --bundles app --target universal-apple-darwin --config src-tauri/tauri.appstore.conf.json

      - name: Build signed PKG
        run: |
          APP_PATH="src-tauri/target/universal-apple-darwin/release/bundle/macos/Subly.app"
          PKG_PATH="src-tauri/target/universal-apple-darwin/release/bundle/macos/Subly.pkg"
          xcrun productbuild --sign "${MAS_INSTALLER_SIGNING_IDENTITY}" --component "$APP_PATH" /Applications "$PKG_PATH"
          echo "PKG_PATH=$PKG_PATH" >> "$GITHUB_ENV"

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-mas-pkg
          path: src-tauri/target/universal-apple-darwin/release/bundle/macos/Subly.pkg

      - name: Upload PKG to App Store Connect
        if: ${{ inputs.upload_to_appstore }}
        run: |
          xcrun altool --upload-app --type macos --file "${PKG_PATH}" --apiKey "${APPLE_API_KEY}" --apiIssuer "${APPLE_API_ISSUER}"
