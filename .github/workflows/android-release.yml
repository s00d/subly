name: Android Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Configure NDK toolchain for openssl vendored cross-build
        # `aisdk` + `tauri-plugin-http` drag `reqwest`'s default-tls feature
        # into the graph, so `openssl-sys` builds libssl from source on
        # Android. NDK r23+ shipped only `llvm-*` unified tools, but
        # `openssl-src` still invokes the legacy `<triple>-ranlib` /
        # `<triple>-ar` binaries — we resurrect those as symlinks here
        # and pin the per-target CC/AR/RANLIB env vars so cargo + the
        # vendored openssl build script agree on the toolchain.
        run: |
          set -euo pipefail
          if [ -n "${ANDROID_NDK_HOME:-}" ] && [ -d "$ANDROID_NDK_HOME" ]; then
            NDK_PATH="$ANDROID_NDK_HOME"
          elif [ -n "${ANDROID_NDK_ROOT:-}" ] && [ -d "$ANDROID_NDK_ROOT" ]; then
            NDK_PATH="$ANDROID_NDK_ROOT"
          else
            NDK_PATH="$(ls -d "$ANDROID_HOME"/ndk/*/ 2>/dev/null | sort -V | tail -n1)"
            NDK_PATH="${NDK_PATH%/}"
          fi
          if [ -z "$NDK_PATH" ] || [ ! -d "$NDK_PATH" ]; then
            echo "Could not locate Android NDK" >&2
            exit 1
          fi
          NDK_BIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "Using NDK at $NDK_PATH"
          echo "$NDK_BIN" >> "$GITHUB_PATH"
          {
            echo "ANDROID_NDK_HOME=$NDK_PATH"
            echo "ANDROID_NDK_ROOT=$NDK_PATH"
            echo "NDK_HOME=$NDK_PATH"
          } >> "$GITHUB_ENV"
          for triple in \
            aarch64-linux-android \
            armv7a-linux-androideabi \
            armv7-linux-androideabi \
            i686-linux-android \
            x86_64-linux-android; do
            for tool in ar ranlib nm strip; do
              target="$NDK_BIN/$triple-$tool"
              if [ ! -e "$target" ]; then
                ln -sf "$NDK_BIN/llvm-$tool" "$target"
              fi
            done
          done
          API=24
          {
            echo "CC_aarch64_linux_android=$NDK_BIN/aarch64-linux-android${API}-clang"
            echo "CC_armv7_linux_androideabi=$NDK_BIN/armv7a-linux-androideabi${API}-clang"
            echo "CC_i686_linux_android=$NDK_BIN/i686-linux-android${API}-clang"
            echo "CC_x86_64_linux_android=$NDK_BIN/x86_64-linux-android${API}-clang"
            for t in aarch64_linux_android armv7_linux_androideabi i686_linux_android x86_64_linux_android; do
              echo "AR_${t}=$NDK_BIN/llvm-ar"
              echo "RANLIB_${t}=$NDK_BIN/llvm-ranlib"
            done
          } >> "$GITHUB_ENV"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: "android-release"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Prepare Tauri CLI shim for Android Gradle task
        run: |
          cat > src-tauri/tauri <<'EOF'
          #!/usr/bin/env node
          import { createRequire } from "node:module";
          const require = createRequire(import.meta.url);
          require("../node_modules/@tauri-apps/cli/tauri.js");
          EOF
          chmod +x src-tauri/tauri

      - name: Build Android APK (unsigned)
        run: pnpm tauri android build --apk

      - name: Resolve APK path
        id: apk
        run: |
          APK_PATH="$(ls src-tauri/gen/android/app/build/outputs/apk/**/*.apk 2>/dev/null | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            APK_PATH="$(ls src-tauri/gen/android/app/build/outputs/apk/*/*/*.apk 2>/dev/null | head -n 1)"
          fi
          if [ -z "$APK_PATH" ]; then
            echo "No APK found under src-tauri/gen/android/app/build/outputs/apk/"
            exit 1
          fi
          APK_NAME="subly-android-${GITHUB_REF_NAME:-manual}.apk"
          cp "$APK_PATH" "$RUNNER_TEMP/$APK_NAME"
          echo "apk_path=$RUNNER_TEMP/$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.apk.outputs.apk_path }}

      - name: Resolve release tag
        id: release_tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            VERSION="$(node -p "require('./package.json').version")"
            TAG="v${VERSION}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Using release tag: ${TAG}"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: ${{ steps.apk.outputs.apk_path }}
          fail_on_unmatched_files: true

