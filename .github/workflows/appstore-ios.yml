name: App Store iOS

on:
  workflow_dispatch:
    inputs:
      upload_to_appstore:
        description: "Upload IPA to App Store Connect"
        required: true
        default: false
        type: boolean

jobs:
  ios:
    name: Build iOS IPA
    runs-on: macos-26
    env:
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      SUBLY_API_KEY_BASE64: ${{ secrets.SUBLY_API_KEY_BASE64 }}
      IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}
      IOS_WIDGET_MOBILE_PROVISION: ${{ secrets.IOS_WIDGET_MOBILE_PROVISION }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: "appstore-ios"

      - name: Check Xcode / iOS SDK requirement
        run: |
          xcodebuild -version
          xcodebuild -showsdks
          if ! xcodebuild -showsdks | grep -q "iphoneos26"; then
            echo "ERROR: App Store Connect now requires iOS 26 SDK+. This runner does not have iphoneos26."
            echo "Use a runner with Xcode 26+ (self-hosted or newer GitHub hosted image when available)."
            exit 1
          fi

      - name: Install frontend dependencies
        run: pnpm install

      - name: Write App Store Connect API key
        run: |
          mkdir -p "$HOME/private_keys"
          KEY_PATH="$HOME/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          echo "$SUBLY_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      # Main app com.s00d.subly + widget com.s00d.subly.widget share App Group group.com.s00d.subly.
      # Apple issues ONE provisioning profile per App ID — you need TWO .mobileprovision files
      # (main + widget). Secrets alone do nothing until imported below.
      - name: Validate manual iOS signing secrets
        run: |
          test -n "$IOS_CERTIFICATE" || (echo "Missing IOS_CERTIFICATE secret" && exit 1)
          test -n "$IOS_CERTIFICATE_PASSWORD" || (echo "Missing IOS_CERTIFICATE_PASSWORD secret" && exit 1)
          test -n "$IOS_MOBILE_PROVISION" || (echo "Missing IOS_MOBILE_PROVISION secret (main app com.s00d.subly)" && exit 1)
          test -n "$IOS_WIDGET_MOBILE_PROVISION" || (echo "Missing IOS_WIDGET_MOBILE_PROVISION secret — App Store IPA needs a separate Distribution profile for com.s00d.subly.widget (widget); one profile for the main app is not enough." && exit 1)

      - name: Import signing certificate and provisioning profiles
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}
          IOS_WIDGET_MOBILE_PROVISION: ${{ secrets.IOS_WIDGET_MOBILE_PROVISION }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p actions "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p actions "$KEYCHAIN_PATH"
          echo "$IOS_CERTIFICATE" | base64 --decode > /tmp/ios_distribution.p12
          security import /tmp/ios_distribution.p12 -k "$KEYCHAIN_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -A
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions "$KEYCHAIN_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          install_pp() {
            local slug="$1"
            local b64="$2"
            local env_var_name="$3"
            echo "$b64" | base64 --decode > "/tmp/subly_${slug}.mobileprovision"
            security cms -D -i "/tmp/subly_${slug}.mobileprovision" > "/tmp/subly_${slug}.plist"
            UUID="$(plutil -extract UUID raw "/tmp/subly_${slug}.plist")"
            NAME="$(plutil -extract Name raw "/tmp/subly_${slug}.plist")"
            TEAM_DOT_APP="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "/tmp/subly_${slug}.plist" 2>/dev/null || echo "?")"
            cp "/tmp/subly_${slug}.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/${UUID}.mobileprovision"
            echo "Installed ${slug} UUID=$UUID Name=${NAME} application-identifier=${TEAM_DOT_APP}"
            echo "${env_var_name}=${NAME}" >> "$GITHUB_ENV"
          }
          install_pp "main" "$IOS_MOBILE_PROVISION" "SUBLY_MAIN_PROFILE_NAME"
          install_pp "widget" "$IOS_WIDGET_MOBILE_PROVISION" "SUBLY_WIDGET_PROFILE_NAME"
          echo ""
          echo "========== SIGNING: identities in keychain =========="
          security find-identity -v -p codesigning || true
          echo ""
          echo "========== SIGNING: provisioning profiles installed (filenames = UUID.mobileprovision) =========="
          ls -1 "$HOME/Library/MobileDevice/Provisioning Profiles" 2>/dev/null | head -50 || true
          echo "(total files: $(ls -1 "$HOME/Library/MobileDevice/Provisioning Profiles" 2>/dev/null | wc -l | tr -d ' '))"

      # Without provisioningProfiles for BOTH bundle IDs, xcodebuild -exportArchive can re-sign the
      # widget appex without embedded entitlements → App Store validation 409.
      - name: Write ExportOptions.plist for App Store export (main app + widget extension)
        run: |
          test -n "${SUBLY_MAIN_PROFILE_NAME}" || (echo "SUBLY_MAIN_PROFILE_NAME missing" && exit 1)
          test -n "${SUBLY_WIDGET_PROFILE_NAME}" || (echo "SUBLY_WIDGET_PROFILE_NAME missing" && exit 1)
          test -n "${APPLE_TEAM_ID}" || (echo "APPLE_TEAM_ID missing" && exit 1)
          OUT="src-tauri/gen/apple/ExportOptions.plist"
          python3 << 'PY'
          import os
          import plistlib

          out = os.environ["OUT_PATH"]
          data = {
              "method": "app-store-connect",
              "teamID": os.environ["APPLE_TEAM_ID"],
              "signingStyle": "manual",
              "provisioningProfiles": {
                  "com.s00d.subly": os.environ["SUBLY_MAIN_PROFILE_NAME"],
                  "com.s00d.subly.widget": os.environ["SUBLY_WIDGET_PROFILE_NAME"],
              },
          }
          with open(out, "wb") as f:
              plistlib.dump(data, f, fmt=plistlib.FMT_XML)
          print("Wrote", out)
          PY
          plutil -lint "$OUT"
          echo "--- ExportOptions.plist ---"
          /usr/libexec/PlistBuddy -c 'Print' "$OUT" || true
        env:
          OUT_PATH: src-tauri/gen/apple/ExportOptions.plist

      # Archive only: skipping Tauri’s IPA export avoids it overwriting ExportOptions.plist before export.
      - name: Build iOS archive (xcarchive)
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ env.APPLE_TEAM_ID }}
        run: pnpm tauri ios build --archive-only --ci

      - name: Resolve xcarchive path
        run: |
          ARCHIVE="$(find src-tauri/gen/apple -name "*.xcarchive" -type d | sort | tail -n 1)"
          if [ -z "$ARCHIVE" ] || [ ! -d "$ARCHIVE" ]; then
            echo "ERROR: No .xcarchive under src-tauri/gen/apple"
            find src-tauri/gen/apple -type d -maxdepth 4 2>/dev/null | head -80 || true
            exit 1
          fi
          echo "XCODE_ARCHIVE_PATH=$ARCHIVE" >> "$GITHUB_ENV"
          echo "Resolved xcarchive: $ARCHIVE"
          du -sh "$ARCHIVE" || true

      - name: Diagnostics — widget in xcarchive (before export)
        run: |
          set +e
          A="${XCODE_ARCHIVE_PATH:?missing XCODE_ARCHIVE_PATH}"
          APP="$A/Products/Applications/Subly.app"
          W_EXE="$APP/PlugIns/SublyWidgetExtension.appex/SublyWidgetExtension"
          W_APPEX="$(dirname "$W_EXE")"
          echo "========== XCODE_ARCHIVE_PATH =========="
          echo "$A"
          echo "========== Subly.app exists? =========="
          ls -la "$APP" 2>&1 | head -5
          echo "========== Widget executable path =========="
          echo "$W_EXE"
          ls -la "$W_EXE" 2>&1
          echo "========== codesign -dv (widget) =========="
          codesign -dv --verbose=4 "$W_EXE" 2>&1
          echo "========== codesign --entitlements (widget) — expect com.apple.security.application-groups =========="
          codesign -d --entitlements :- "$W_EXE" 2>&1
          EC=$?
          if [ "$EC" != 0 ]; then echo "codesign entitlements exit=$EC (empty or failed)"; fi
          echo "========== embedded.mobileprovision in appex =========="
          ls -la "$W_APPEX/embedded.mobileprovision" 2>&1
          if [ -f "$W_APPEX/embedded.mobileprovision" ]; then
            echo "--- profile application-identifier / Name ---"
            security cms -D -i "$W_APPEX/embedded.mobileprovision" > /tmp/emb.plist
            plutil -extract Name raw /tmp/emb.plist 2>/dev/null && echo "(profile Name)"
            /usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' /tmp/emb.plist 2>/dev/null
          fi

      - name: Export IPA with ExportOptions.plist (widget + main provisioning profiles)
        run: |
          set -euo pipefail
          ARCHIVE="${XCODE_ARCHIVE_PATH:?}"
          echo "Using archive: $ARCHIVE"
          EXPORT_DIR="src-tauri/gen/apple/build/ipa_export"
          rm -rf "$EXPORT_DIR"
          mkdir -p "$EXPORT_DIR"
          echo "========== xcodebuild -exportArchive (full log) =========="
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE" \
            -exportPath "$EXPORT_DIR" \
            -exportOptionsPlist src-tauri/gen/apple/ExportOptions.plist 2>&1 | tee /tmp/export_archive.log
          IPA_PATH="$(find "$EXPORT_DIR" -maxdepth 4 -name "*.ipa" | head -n 1)"
          if [ -z "$IPA_PATH" ] || [ ! -f "$IPA_PATH" ]; then
            echo "Export did not produce an IPA under $EXPORT_DIR"
            ls -laR "$EXPORT_DIR" || true
            echo "--- tail export log ---"
            tail -100 /tmp/export_archive.log || true
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"
          echo "Exported IPA: $IPA_PATH"
          ls -lh "$IPA_PATH"

      - name: Diagnostics — widget entitlements inside exported IPA
        run: |
          set +e
          IPA="${IPA_PATH:?missing IPA_PATH}"
          echo "========== IPA =========="
          ls -lh "$IPA"
          rm -rf /tmp/ipa_ent_check
          mkdir -p /tmp/ipa_ent_check
          unzip -q "$IPA" -d /tmp/ipa_ent_check
          W="/tmp/ipa_ent_check/Payload/Subly.app/PlugIns/SublyWidgetExtension.appex/SublyWidgetExtension"
          echo "========== Widget path in IPA =========="
          ls -la "$W" 2>&1
          echo "========== codesign -dv (IPA widget) =========="
          codesign -dv --verbose=4 "$W" 2>&1
          echo "========== codesign --entitlements (IPA widget) — App Store reads this =========="
          codesign -d --entitlements :- "$W" 2>&1
          echo "========== spctl / assess (informational) =========="
          spctl -a -vv -t install "$W" 2>&1 || true

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: src-tauri/gen/apple/build/ipa_export/

      - name: Upload IPA to App Store Connect
        if: ${{ inputs.upload_to_appstore }}
        run: |
          echo "========== altool upload =========="
          ls -lh "${IPA_PATH}"
          xcrun altool --upload-app --type ios --file "${IPA_PATH}" --apiKey "${APPLE_API_KEY}" --apiIssuer "${APPLE_API_ISSUER}" --verbose
